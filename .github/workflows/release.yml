name: Release

on:
  push:
    branches: [release]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-on-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build:linux

      - name: See dist
        shell: bash
        run: |
          cd dist
          ls -R

      - uses: actions/upload-artifact@v4
        with:
          name: linux_build
          path: |
            dist/*.deb
            dist/*.yml

  build-on-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build:win

      - uses: actions/download-artifact@v4
        with:
          name: linux_build

      - name: See dist
        shell: bash
        run: |
          cd dist
          ls -R

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/*.exe
            dist/*.deb
            dist/*.yml
            dist/*.blockmap

      - uses: actions/upload-artifact@v4
        with:
          name: upload_to_google_drive
          path: |
            dist/*.exe
            dist/*.deb
            dist/*.yml
            dist/*.blockmap
