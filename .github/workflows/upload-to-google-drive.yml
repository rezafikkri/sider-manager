name: Upload to Google Drive
on:
  release:
    types: [published]

jobs:
  get-app-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get App Version
        shell: bash
        run: echo "APP_VERSION=$(jq -r '.version' package.json)" >> $GITHUB_ENV

  download-and-upload:
    needs: get-app-version
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PARENT_FOLDER_ID: 1jn2NjBBRHY0cR4xrd9pLjUUFr5QjScEv

    strategy:
      matrix: 
        file-name:
          - builder-debug.yml
          - latest-linux.yml
          - latest.yml
          - sider-manager-${{ env.APP_VERSION }}-setup.exe
          - sider-manager-${{ env.APP_VERSION }}-setup.exe.blockmap
          - sider-manager_${{ env.APP_VERSION }}_amd64.deb

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get test-build-and-release Workflow Run Id
        shell: bash
        run: |
          RUNID=$(gh run list --repo rezafikkri/sider-manager --json databaseId --workflow=release.yml --limit 1 | jq '.[0].databaseId')
          echo "RUNID=$RUNID" >> $GITHUB_ENV

      - name: Create Release Dir
        shell: bash
        run: mkdir release

      - uses: actions/download-artifact@v4
        with:
          github-token: ${{ env.GITHUB_TOKEN }}
          name: upload_to_google_drive
          run-id: ${{ env.RUNID }}
          path: release

      - name: Display structure of downloaded files
        shell: bash
        run: |
          cd release
          ls -R

      - name: Upload (${{ matrix.file-name }}) Artifacts TO Google Drive
        uses: Jumbo810/Upload_Github_Artifacts_TO_GDrive@v2.2.2
        with:
          target: release/${{ matrix.file-name }}
          credentials: ${{ secrets.G_SERVICE_CREDENTIAL }}
          parent_folder_id: ${{ env.PARENT_FOLDER_ID }}
          child_folder: v${{ env.APP_VERSION }}
          override: true
